services:
  lan-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${TYPHOON_IMAGE:-typhoon-terminal:lan-server}
    container_name: typhoon-lan-server
    restart: unless-stopped
    command:
      - --lan-server
      - --cache-dir
      - /cache
      - --lan-port
      - ${TYPHOON_LAN_PORT:-9847}
      - --metrics-port
      - ${TYPHOON_METRICS_CONTAINER_PORT:-9090}
    environment:
      TYPHOON_CACHE_DIR: /cache
      TYPHOON_LAN_PASSPHRASE: ${TYPHOON_LAN_PASSPHRASE:-}
      RUST_LOG: ${RUST_LOG:-typhoon_engine=info,typhoon_cli=info}
    volumes:
      - type: bind
        source: ${TYPHOON_CACHE_HOST_PATH:?set TYPHOON_CACHE_HOST_PATH to a local or NAS-mounted cache directory}
        target: /cache
    ports:
      - "${TYPHOON_LAN_PORT:-9847}:9847"
      - "${TYPHOON_METRICS_PORT:-9090}:9090"
    networks:
      - typhoon
    healthcheck:
      test: ["CMD", "typhoon-cli", "--help"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 5s

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:latest}
    container_name: typhoon-prometheus
    restart: unless-stopped
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${TYPHOON_PROMETHEUS_PORT:-9091}:9090"
    networks:
      - typhoon
    depends_on:
      - lan-server

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana-oss:latest}
    container_name: typhoon-grafana
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${TYPHOON_GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${TYPHOON_GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${TYPHOON_GRAFANA_PORT:-3000}:3000"
    networks:
      - typhoon
    depends_on:
      - prometheus

  kafka:
    image: ${KAFKA_IMAGE:-apache/kafka:4.2.0}
    hostname: kafka
    container_name: typhoon-kafka
    restart: unless-stopped
    profiles: ["kafka"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://${TYPHOON_KAFKA_ADVERTISED_HOST:-localhost}:${TYPHOON_KAFKA_PORT:-9092},PLAINTEXT://kafka:19092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: ${TYPHOON_KAFKA_CLUSTER_ID:-4L6g3nShT-eMCtK--X86sw}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    ports:
      - "${TYPHOON_KAFKA_PORT:-9092}:9092"
    networks:
      - typhoon
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  typhoon:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  kafka-data:
