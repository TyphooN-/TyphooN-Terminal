[package]
name = "typhoon-engine"
version = "0.1.0"
edition = "2024"
description = "TyphooN Terminal Engine — broker, cache, risk, analytics (pure Rust, no UI framework)"
license = "LicenseRef-BSL-1.1"

[lib]
name = "typhoon_engine"
path = "src/lib.rs"

# Library crate only — native app binary lives in ../native/

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "time", "macros", "net"] }
reqwest = { version = "0.13", features = ["json", "query"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
zstd = "0.13"
zeroize = { version = "1", features = ["derive"] }
tokio-tungstenite = { version = "0.29", features = ["native-tls"] }
futures-util = "0.3"
async-trait = "0.1"
rusqlite = { version = "0.39", features = ["bundled"] }
aes-gcm = "0.10"
sha2 = "0.10"
hmac = "0.12"
pbkdf2 = { version = "0.12", features = ["simple"] }
rand = "0.10"
base64 = "0.22"
rayon = "1.11"
calamine = "0.34"
zip = { version = "7", default-features = false, features = ["deflate-flate2-zlib-rs"] }
mql5-compiler = { path = "../mql5-compiler" }
