[package]
edition = "2021"
name = "thirtyfour"
version = "0.36.1"
authors = [
    "Steve Pryde <steve@stevepryde.com>",
    "Vrtgs <vrtgs@vrtgs.xyz>",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = """
Thirtyfour is a Selenium / WebDriver library for Rust, for automated website UI testing.

Tested on Chrome and Firefox, but any webdriver-capable browser should work.
"""
homepage = "https://github.com/Vrtgs/thirtyfour"
documentation = "https://docs.rs/thirtyfour"
readme = "README.md"
keywords = [
    "selenium",
    "webdriver",
    "chromedriver",
    "geckodriver",
    "automation",
]
categories = [
    "api-bindings",
    "development-tools::testing",
    "web-programming::http-client",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/Vrtgs/thirtyfour"
resolver = "3"

[features]
component = ["thirtyfour-macros"]
debug_sync_quit = []
default = [
    "reqwest",
    "rustls-tls",
    "component",
]
native-tls = ["reqwest/native-tls"]
reqwest = ["dep:reqwest"]
rustls-tls = ["reqwest/rustls"]
tokio-multi-threaded = ["tokio/rt-multi-thread"]

[lib]
name = "thirtyfour"
path = "src/lib.rs"

