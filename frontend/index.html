<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TyphooN Terminal</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <!-- Connection modal -->
  <div id="connect-modal" class="modal">
    <div class="modal-content">
      <h3>Connect to Alpaca</h3>
      <div id="saved-accounts-section">
        <label>Saved Accounts:</label>
        <select id="saved-accounts">
          <option value="">— New Account —</option>
        </select>
        <button id="btn-delete-account" class="btn-small btn-danger-small">×</button>
      </div>
      <input id="account-name" type="text" placeholder="Account Name (e.g. Paper Main)" />
      <input id="api-key" type="text" placeholder="API Key" />
      <input id="secret-key" type="password" placeholder="Secret Key" />
      <div class="account-type-row">
        <label>Type:</label>
        <select id="account-type">
          <option value="paper">Paper</option>
          <option value="live">Live</option>
        </select>
      </div>
      <label><input id="save-credentials" type="checkbox" checked /> Save credentials</label>
      <button id="btn-connect">Connect</button>
      <div id="connect-status"></div>
    </div>
  </div>

  <div id="app">
    <!-- Top bar: symbol selector + account info -->
    <div id="top-bar">
      <div id="symbol-wrapper">
        <input id="symbol-input" type="text" placeholder="Symbol (e.g. AAPL, BTC/USD)" autocomplete="off" />
        <div id="symbol-autocomplete" class="autocomplete-list hidden"></div>
      </div>
      <select id="timeframe-select">
        <option value="1Min">1m</option>
        <option value="5Min">5m</option>
        <option value="15Min">15m</option>
        <option value="1Hour" selected>1H</option>
        <option value="4Hour">4H</option>
        <option value="1Day">D1</option>
        <option value="1Week">W1</option>
      </select>
      <select id="bar-count">
        <option value="500">500</option>
        <option value="1000" selected>1K</option>
        <option value="2000">2K</option>
        <option value="5000">5K</option>
        <option value="10000">10K</option>
      </select>
      <button id="btn-load-chart">Load</button>
      <span id="loading-indicator" class="loading hidden">Loading...</span>
      <span id="connect-status-bar" class="status-bar"></span>
      <span id="account-info" class="info-label"></span>
    </div>

    <!-- Main layout: chart + controls -->
    <div id="main-layout">
      <!-- Chart area with sub-panes -->
      <div id="chart-stack">
        <div id="chart-container"></div>
        <div id="fisher-pane" class="sub-pane"></div>
        <div id="volume-pane" class="sub-pane"></div>
      </div>

      <!-- Right panel: controls + dashboard -->
      <div id="right-panel">
        <!-- Button grid (matches TyphooN EA 5×2 layout) -->
        <div id="button-grid">
          <button id="btn-trade" class="btn-action">Open Trade</button>
          <button id="btn-martingale" class="btn-mg">MG: OFF</button>
          <button id="btn-buy-lines" class="btn-lines">Buy Lines</button>
          <button id="btn-sell-lines" class="btn-lines">Sell Lines</button>
          <button id="btn-destroy-lines" class="btn-lines">Destroy Lines</button>
          <button id="btn-open-mg" class="btn-mg">Open MG</button>
          <button id="btn-close-all" class="btn-danger">Close All</button>
          <button id="btn-close-partial" class="btn-danger">Close Partial</button>
          <button id="btn-set-sl" class="btn-lines">Set SL</button>
          <button id="btn-set-tp" class="btn-lines">Set TP</button>
        </div>

        <!-- MTF MA Grid (matches MTF_MA indicator) -->
        <div id="mtf-grid">
          <div class="mtf-header">
            <span class="mtf-label">MTF</span>
            <span class="mtf-tf">H1</span>
            <span class="mtf-tf">H4</span>
            <span class="mtf-tf">D1</span>
            <span class="mtf-tf">W1</span>
          </div>
          <div class="mtf-row" id="mtf-sma200">
            <span class="mtf-label">SMA200</span>
            <span class="mtf-dot" id="mtf-sma200-1Hour">●</span>
            <span class="mtf-dot" id="mtf-sma200-4Hour">●</span>
            <span class="mtf-dot" id="mtf-sma200-1Day">●</span>
            <span class="mtf-dot" id="mtf-sma200-1Week">●</span>
          </div>
          <div class="mtf-row" id="mtf-kama">
            <span class="mtf-label">KAMA</span>
            <span class="mtf-dot" id="mtf-kama-1Hour">●</span>
            <span class="mtf-dot" id="mtf-kama-4Hour">●</span>
            <span class="mtf-dot" id="mtf-kama-1Day">●</span>
            <span class="mtf-dot" id="mtf-kama-1Week">●</span>
          </div>
          <div class="mtf-row" id="mtf-fisher">
            <span class="mtf-label">Fisher</span>
            <span class="mtf-dot" id="mtf-fisher-1Hour">●</span>
            <span class="mtf-dot" id="mtf-fisher-4Hour">●</span>
            <span class="mtf-dot" id="mtf-fisher-1Day">●</span>
            <span class="mtf-dot" id="mtf-fisher-1Week">●</span>
          </div>
        </div>

        <!-- Dashboard labels (matches TyphooN EA info labels) -->
        <div id="dashboard">
          <div id="info-position" class="dash-row">Position: —</div>
          <div id="info-var" class="dash-row">VaR: —</div>
          <div id="info-risk" class="dash-row">Risk: —</div>
          <div id="info-pl" class="dash-row">P/L: —</div>
          <div id="info-sl-pl" class="dash-row">SL P/L: —</div>
          <div id="info-tp-pl" class="dash-row">TP P/L: —</div>
          <div id="info-rr" class="dash-row">RR: —</div>
          <div id="info-margin" class="dash-row">ML: —</div>
          <div id="info-equity" class="dash-row">Eq: —</div>
          <div id="info-balance" class="dash-row">Bal: —</div>
          <div id="info-time" class="dash-row">Next bar: —</div>
        </div>

        <!-- Order mode selector -->
        <div id="order-config">
          <label>Mode:</label>
          <select id="order-mode">
            <option value="VaR">VaR</option>
            <option value="Standard">Standard</option>
            <option value="Fixed">Fixed</option>
            <option value="Dynamic">Dynamic</option>
          </select>
        </div>

        <!-- Indicator Config -->
        <div id="indicator-panel">
          <div id="indicator-header">Indicators ▼</div>
          <div id="indicator-list">
            <!-- TyphooN NNFX system — enabled by default -->
            <div class="ind-section">NNFX System</div>
            <label class="ind-row"><input type="checkbox" data-ind="sma" data-period="200" checked /> 200 SMA</label>
            <label class="ind-row"><input type="checkbox" data-ind="kama" data-period="10" checked /> MultiKAMA (10/2/30)</label>
            <label class="ind-row"><input type="checkbox" data-ind="prev-levels" checked /> Prev Candle Levels (MTF)</label>
            <label class="ind-row"><input type="checkbox" data-ind="supply-demand" checked /> Supply/Demand Zones</label>
            <label class="ind-row"><input type="checkbox" data-ind="atr-proj" data-period="14" checked /> ATR Projection (MTF)</label>
            <label class="ind-row"><input type="checkbox" data-ind="fisher" data-period="32" checked /> Ehlers Fisher (32)</label>
            <label class="ind-row"><input type="checkbox" data-ind="better-vol" checked /> BetterVolume</label>
            <!-- Standard indicators — disabled by default -->
            <div class="ind-section">Standard</div>
            <label class="ind-row"><input type="checkbox" data-ind="ema" data-period="50" /> EMA (50)</label>
            <label class="ind-row"><input type="checkbox" data-ind="ema" data-period="200" /> EMA (200)</label>
            <label class="ind-row"><input type="checkbox" data-ind="sma" data-period="50" /> SMA (50)</label>
            <label class="ind-row"><input type="checkbox" data-ind="dema" data-period="21" /> DEMA (21)</label>
            <label class="ind-row"><input type="checkbox" data-ind="rsi" data-period="14" /> RSI (14)</label>
            <label class="ind-row"><input type="checkbox" data-ind="macd" /> MACD (12/26/9)</label>
            <label class="ind-row"><input type="checkbox" data-ind="bollinger" data-period="20" /> Bollinger (20)</label>
            <label class="ind-row"><input type="checkbox" data-ind="atr" data-period="14" /> ATR (14)</label>
            <label class="ind-row"><input type="checkbox" data-ind="vwap" /> VWAP</label>
            <label class="ind-row"><input type="checkbox" data-ind="rvol" data-period="10" /> RVOL (10)</label>
            <label class="ind-row"><input type="checkbox" data-ind="volume" /> Volume (basic)</label>
          </div>
        </div>
      </div>
    </div>

    <!-- Debug console -->
    <div id="log-panel">
      <div id="log-header">
        <span>Log</span>
        <button id="btn-log-toggle">▼</button>
        <button id="btn-log-clear">Clear</button>
      </div>
      <div id="log-content"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
