[workspace]
resolver = "2"
members = [
    "engine",
    "native",
    "mql5-compiler",
    "cli",
    "web-protocol",
    "web-server",
]
exclude = [
    "web",  # WASM target — built separately via trunk
]

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = "1"
reqwest = { version = "0.13", default-features = false }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = "0.3"
rusqlite = "0.39"
zstd = "0.13"
zeroize = "1"
aes-gcm = "0.10"
sha2 = "0.11"
hmac = "0.13"
pbkdf2 = "0.13"
base64 = "0.22"
thirtyfour = { version = "0.36", default-features = false }
mql5-compiler = { path = "mql5-compiler" }
typhoon-engine = { path = "engine" }
typhoon-web-server = { path = "web-server" }
typhoon-web-protocol = { path = "web-protocol" }

[profile.release]
opt-level = 3
lto = "thin"         # parallel incremental-friendly LTO for normal launch/build
codegen-units = 44   # match this workstation's logical cores (nproc=44)
incremental = true   # much faster edit/run cycles for the native trading terminal
strip = true
panic = "abort"
debug = false

# Use when you explicitly want the slowest/smallest full-program optimized artifact.
[profile.release-max]
inherits = "release"
lto = "fat"
codegen-units = 1
incremental = false

[patch.crates-io]
thirtyfour = { path = "vendor/thirtyfour" }
