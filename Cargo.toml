[workspace]
resolver = "2"
members = [
    "engine",
    "native",
    "mql5-compiler",
    "cli",
    "web-protocol",
    "web-server",
]
exclude = [
    "web",  # WASM target — built separately via trunk
]

[profile.release]
opt-level = 3        # max optimizations (was 2)
lto = "fat"          # full-program LTO (was thin) — better inlining
codegen-units = 1    # single codegen unit for max optimization
strip = true
panic = "abort"      # smaller binary, no unwind tables
debug = false

[patch.crates-io]
thirtyfour = { path = "vendor/thirtyfour" }
