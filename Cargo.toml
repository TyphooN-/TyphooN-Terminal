[workspace]
resolver = "2"
members = [
    "typhoon-engine",
    "typhoon-native",
    "typhoon-research-ui",
    "typhoon-transpiler",
]

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["preserve_order"] }
tokio = { version = "1.52", features = ["rt-multi-thread", "sync", "time", "macros", "net"] }
reqwest = { version = "0.13", default-features = false }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = "0.3"
rusqlite = "0.39"
zstd = "0.13"
zeroize = "1.8"
aes-gcm = "0.10"
sha2 = "0.11"
hmac = "0.13"
pbkdf2 = "0.13"
base64 = "0.22"
typhoon-transpiler = { path = "typhoon-transpiler" }
typhoon-engine = { path = "typhoon-engine" }
typhoon-research-ui = { path = "typhoon-research-ui" }

[profile.release]
opt-level = 3
lto = "thin"         # parallel incremental-friendly LTO for normal launch/build
codegen-units = 44   # match this workstation's logical cores (nproc=44)
incremental = true   # much faster edit/run cycles for the native trading terminal
strip = true
panic = "abort"
debug = false

# Use when you explicitly want the slowest/smallest full-program optimized artifact.
[profile.release-max]
inherits = "release"
lto = "fat"
codegen-units = 1
incremental = false
