[package]
name = "typhoon-native"
version = "0.1.0"
edition = "2024"
description = "TyphooN Terminal — Native GPU renderer (egui + wgpu)"

[[bin]]
name = "typhoon"
path = "src/main.rs"

[dependencies]
# Engine (shared core library)
typhoon-engine = { path = "../engine" }

# Native GPU UI — latest stable egui ecosystem
eframe = { version = "0.33", default-features = true, features = ["wgpu"] }
egui = "0.33"
egui_plot = "0.34"
wgpu = "27"  # Pinned to match eframe 0.33's internal wgpu — will bump to 29 when eframe 0.34 releases

# Async runtime (shared with engine)
tokio = { version = "1", features = ["rt-multi-thread", "sync", "time", "macros"] }

# HTTP client (for Kraken API in broker task — matches engine)
reqwest = { version = "0.13", features = ["json"] }

# Date/time formatting (for chart time axis labels)
chrono = { version = "0.4", features = ["serde"] }

# Native file dialog
rfd = "0.17"

# Serialization for session persistence
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
