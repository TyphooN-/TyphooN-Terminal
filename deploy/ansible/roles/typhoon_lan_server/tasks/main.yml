---
- name: Ensure TyphooN LAN server directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ typhoon_lan_server_stack_dir }}"
    - "{{ typhoon_lan_server_cache_host_path }}"
    - "{{ typhoon_lan_server_stack_dir }}/prometheus"
    - "{{ typhoon_lan_server_stack_dir }}/grafana/provisioning/datasources"
    - "{{ typhoon_lan_server_stack_dir }}/grafana/provisioning/dashboards"
    - "{{ typhoon_lan_server_stack_dir }}/grafana/dashboards"

- name: Render Prometheus scrape config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ typhoon_lan_server_stack_dir }}/prometheus/prometheus.yml"
    owner: root
    group: root
    mode: "0644"
  when: typhoon_lan_server_prometheus_enabled | bool

- name: Render Grafana Prometheus datasource
  ansible.builtin.template:
    src: grafana-datasource.yml.j2
    dest: "{{ typhoon_lan_server_stack_dir }}/grafana/provisioning/datasources/prometheus.yml"
    owner: root
    group: root
    mode: "0644"
  when: typhoon_lan_server_grafana_enabled | bool

- name: Render Grafana dashboard provider
  ansible.builtin.template:
    src: grafana-dashboard-provider.yml.j2
    dest: "{{ typhoon_lan_server_stack_dir }}/grafana/provisioning/dashboards/typhoon.yml"
    owner: root
    group: root
    mode: "0644"
  when: typhoon_lan_server_grafana_enabled | bool

- name: Render Grafana LAN server dashboard
  ansible.builtin.template:
    src: grafana-dashboard.json.j2
    dest: "{{ typhoon_lan_server_stack_dir }}/grafana/dashboards/typhoon-lan-server.json"
    owner: root
    group: root
    mode: "0644"
  when: typhoon_lan_server_grafana_enabled | bool

- name: Render TyphooN LAN server compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ typhoon_lan_server_stack_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  register: typhoon_lan_server_compose

- name: Pull TyphooN LAN server image
  ansible.builtin.command:
    cmd: docker compose pull
    chdir: "{{ typhoon_lan_server_stack_dir }}"
  register: typhoon_lan_server_pull_result
  changed_when: "'Downloaded newer image' in typhoon_lan_server_pull_result.stdout"
  when: typhoon_lan_server_pull | bool

- name: Start TyphooN LAN server
  ansible.builtin.command:
    cmd: >-
      docker compose
      -p {{ typhoon_lan_server_compose_project }}
      up -d{{ ' --build' if typhoon_lan_server_build_context | length > 0 else '' }}
    chdir: "{{ typhoon_lan_server_stack_dir }}"
  register: typhoon_lan_server_up
  changed_when: >
    typhoon_lan_server_compose.changed
    or 'Creating' in typhoon_lan_server_up.stdout
    or 'Recreating' in typhoon_lan_server_up.stdout
    or 'Started' in typhoon_lan_server_up.stdout
    or 'Built' in typhoon_lan_server_up.stdout
